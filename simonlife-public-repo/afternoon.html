<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f5ecd9">
  <title>SimonLife Afternoon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="hero__frame"></div>
      <p class="eyebrow">SimonLife</p>
      <h1>Afternoon</h1>
      <p class="hero__summary">Primary strength work, push or pull emphasis, and the clean middle block of the day.</p>
    </header>
    <section class="vault-card">
      <div class="section-title"><p class="kicker">Program</p><h2>Afternoon block</h2></div>
      <div class="list-panel" id="routine-list"></div>
    </section>
    <section class="vault-card">
      <div class="section-title"><p class="kicker">Voice log</p><h2>What did you actually do?</h2></div>
      <div class="voice-strip">
        <button id="routine-voice" class="action-button action-button--soft">Tap to talk</button>
        <p class="voice-strip__copy">Say the set, load, and outcome. Example: "pike push-ups 5 by 6 clean".</p>
      </div>
      <div class="form-grid">
        <label class="field field--full"><span>Exercise</span><input id="exercise" type="text" placeholder="e.g. pike push-ups"></label>
        <label class="field"><span>Load</span><input id="load" type="text" placeholder="BW or 27 lb"></label>
        <label class="field"><span>Reps / seconds</span><input id="reps" type="text" placeholder="5 x 6"></label>
        <label class="field field--full"><span>Notes</span><textarea id="notes" rows="3" placeholder="strict, strong, no elbow pain"></textarea></label>
      </div>
      <button id="save-routine" class="action-button">Add Afternoon Entry</button>
    </section>
  </main>
  <nav class="dock">
    <a class="dock__item" href="morning.html">Morning</a><span class="dock__divider"></span>
    <span class="dock__item dock__item--active">Afternoon</span><span class="dock__divider"></span>
    <a class="dock__item" href="evening.html">Evening</a><span class="dock__divider"></span>
    <a class="dock__item" href="training.html">Training</a>
  </nav>
  <script src="simonlife-store.js"></script>
  <script src="voice.js"></script>
  <script>
    const state = SimonLifeStore.load();
    const list = document.getElementById("routine-list");
    state.weekTargets.monday.midday.forEach((item) => {
      const row = document.createElement("article");
      row.className = "action";
      row.innerHTML = `<h3>Afternoon item</h3><p>${item}</p>`;
      list.appendChild(row);
    });
    SimonLifeVoice.attach("routine-voice", "exercise", {
      buttonLabel: "Tap to talk",
      onResult(transcript) {
        const amountMatch = transcript.match(/(\d+(?:\.\d+)?(?:\s*x\s*\d+(?:\.\d+)?)?|\d+:\d+)/i);
        const loadMatch = transcript.match(/\b(\d+(?:\.\d+)?\s?(?:lb|lbs|kg)|bodyweight|bw)\b/i);
        if (amountMatch && !document.getElementById("reps").value) {
          document.getElementById("reps").value = amountMatch[1];
        }
        if (loadMatch && !document.getElementById("load").value) {
          document.getElementById("load").value = loadMatch[1];
        }
      }
    });
    document.getElementById("save-routine").addEventListener("click", () => {
      const exercise = document.getElementById("exercise").value.trim();
      const load = document.getElementById("load").value.trim();
      const reps = document.getElementById("reps").value.trim();
      const notes = document.getElementById("notes").value.trim();
      if (!exercise || !reps) return;
      SimonLifeStore.update((s) => {
        s.training.push({ exercise: `[Afternoon] ${exercise}`, load, reps, notes });
      });
      document.getElementById("exercise").value = "";
      document.getElementById("load").value = "";
      document.getElementById("reps").value = "";
      document.getElementById("notes").value = "";
      document.getElementById("save-routine").textContent = "Afternoon Entry Added";
    });
  </script>
</body>
</html>

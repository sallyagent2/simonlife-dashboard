<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f5ecd9">
  <title>SimonLife Close Capsule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="hero__frame"></div>
      <p class="eyebrow">SimonLife</p>
      <h1>Close Capsule</h1>
      <p class="hero__summary">Seal the day once the real food, training, and baseline facts are in place.</p>
    </header>
    <section class="vault-card">
      <div class="section-title"><p class="kicker">Closure Check</p><h2>Before you close</h2></div>
      <div class="list-panel" id="closure-list"></div>
      <button id="close-capsule-btn" class="action-button action-button--close">Mark Capsule Closed</button>
    </section>
    <section class="vault-card">
      <div class="section-title"><p class="kicker">Capsule Preview</p><h2>What today will seal</h2></div>
      <pre id="capsule-preview" class="capsule-preview"></pre>
    </section>
  </main>
  <nav class="dock">
    <a class="dock__item" href="index.html">Front</a><span class="dock__divider"></span>
    <a class="dock__item" href="food.html">Food</a><span class="dock__divider"></span>
    <a class="dock__item" href="training.html">Training</a><span class="dock__divider"></span>
    <span class="dock__item dock__item--active">Close</span>
  </nav>
  <script src="simonlife-store.js"></script>
  <script>
    const list = document.getElementById("closure-list");
    const preview = document.getElementById("capsule-preview");

    function buildPreview(s) {
      const food = s.food.length
        ? s.food.map((item) => `- ${item.item}: ${item.amount} ${item.unit}`).join("\n")
        : "- none logged";
      const training = s.training.length
        ? s.training.map((item) => `- ${item.exercise}: ${item.load || "BW"} / ${item.reps}${item.notes ? ` / ${item.notes}` : ""}`).join("\n")
        : "- none logged";
      const baseline = Object.entries(s.baseline)
        .filter(([, value]) => value)
        .map(([key, value]) => `- ${key}: ${value}`)
        .join("\n") || "- none saved";

      return [
        `${s.day.week} | ${s.day.day} | ${s.day.date}`,
        `Role: ${s.day.role}`,
        "",
        "[Morning Inputs]",
        `- bodyweight: ${s.bodyweight || "missing"}`,
        `- sleep: ${s.sleepHours || "missing"} hrs`,
        `- sleep quality: ${s.sleepQuality || "missing"}`,
        `- supplements: ${s.supplements || "missing"}`,
        `- joints: ${s.joints || "missing"}`,
        "",
        "[Baseline]",
        baseline,
        "",
        "[Food]",
        food,
        "",
        "[Training]",
        training
      ].join("\n");
    }

    function render() {
      const s = SimonLifeStore.load();
      const checks = [
        ["Food entries", s.food.length ? `${s.food.length} logged` : "Missing"],
        ["Training entries", s.training.length ? `${s.training.length} logged` : "Missing"],
        ["Bodyweight", s.bodyweight || "Missing"],
        ["Sleep", s.sleepHours ? `${s.sleepHours} hrs / ${s.sleepQuality || "?"}` : "Missing"],
        ["Joint scan", s.joints || "Missing"],
        ["Baseline battery", Object.values(s.baseline).filter(Boolean).length ? `${Object.values(s.baseline).filter(Boolean).length} saved` : "Missing"]
      ];
      list.innerHTML = "";
      checks.forEach(([label, amount]) => {
        const row = document.createElement("article");
        row.className = "obligation";
        row.innerHTML = `<div><p class="obligation__label">${label}</p><p class="obligation__note">Required for a clean first capsule.</p></div><p class="obligation__amount">${amount}</p>`;
        list.appendChild(row);
      });
      document.getElementById("close-capsule-btn").textContent = s.capsuleClosed ? "Capsule Closed" : "Mark Capsule Closed";
      preview.textContent = buildPreview(s);
    }

    document.getElementById("close-capsule-btn").addEventListener("click", () => {
      SimonLifeStore.update((s) => {
        s.capsuleClosed = true;
        s.day.capsule = "Closed";
      });
      render();
    });

    render();
  </script>
</body>
</html>
